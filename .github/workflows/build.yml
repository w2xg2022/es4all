name: Build EmulationStation (Armbian aarch64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: arm64v8/debian:trixie
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config gettext ca-certificates zip \
            libsdl2-dev libsdl2-mixer-dev \
            libfreeimage-dev libfreetype-dev \
            libcurl4-openssl-dev libpugixml-dev rapidjson-dev \
            libasound2-dev libvlc-dev libvlccore-dev

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (CMake)
        run: |
          mkdir -p build
          cd build
          cmake .. -DGLES=OFF -DGLES2=ON -DCEC=OFF -DENABLE_EMUELEC=1

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Package artifacts
        run: |
          mkdir -p dist/emulationstation
          cp emulationstation dist/emulationstation/emulationstation
          cp -r resources dist/emulationstation/
          cp -r locale dist/emulationstation/
          cd dist/emulationstation
          zip -r ../emulationstation-armbian-aarch64.zip .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emulationstation-armbian-aarch64
          path: dist/emulationstation/

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP '#define PROGRAM_VERSION_STRING\s+"\K[^"]+' es-app/src/EmulationStation.h)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: es4armbian v${{ steps.version.outputs.version }}
          make_latest: true
          files: dist/emulationstation-armbian-aarch64.zip
          body: |
            压缩包内含三部分：emulationstation（主程序）、resources（图标、启动画面等资源文件）、locale（多语言翻译文件）。解压后三者直接位于压缩包根目录，分别复制覆盖到设备 /opt/emulationstation/ 对应目录，无需重新编译，重启 EmulationStation 即可生效。

            ## 本版内容
            - 补齐与 EmuELEC 基准对比缺漏的简体/繁体中文翻译
            - Release 打包脚本修正：解压后不再多出一层 `emulationstation/` 目录
            - 「平台设置」菜单图标改用 Emuelec 单色图标（配合主题风格）
            - 手柄配置界面 ABXY 方位改为比照实体手柄印刷布局（A=下 / B=右 / X=左 / Y=上）
