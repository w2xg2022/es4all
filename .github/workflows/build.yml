name: "Build EmulationStation (es4all aarch64: armbian/rocknix/emuelec)"

on:
  push:
    # es4all: v1.1-dev 也建置(验证三目标可编)，但只有 main 会发布 Release(见各 job 的 if 守卫)
    branches: [ main, v1.1-dev ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: arm64v8/debian:trixie
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config gettext ca-certificates zip \
            libsdl2-dev libsdl2-mixer-dev \
            libfreeimage-dev libfreetype-dev \
            libcurl4-openssl-dev libpugixml-dev rapidjson-dev \
            libasound2-dev libvlc-dev libvlccore-dev \
            libpulse-dev libespeak-dev

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (CMake)
        run: |
          mkdir -p build
          cd build
          cmake .. -DGLES=OFF -DGLES2=ON -DCEC=OFF -DENABLE_EMUELEC=1 -DDISABLE_KODI=1

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Package artifacts
        run: |
          mkdir -p dist/emulationstation
          cp emulationstation dist/emulationstation/emulationstation
          cp -r resources dist/emulationstation/
          date -u +%Y%m%d%H%M%S > dist/emulationstation/resources/build-info.txt
          cp -r locale dist/emulationstation/
          cd dist/emulationstation
          zip -r ../emulationstation-armbian-aarch64.zip .
          cd ..
          # es4all: 构建指纹 = **整包内容**的确定性 md5(binary + resources + locale)。
          # 不用 zip 本身的 md5: zip 内含档案时间戳, 每次打包都不同、不可重现。
          # 不只算 binary: 纯翻译/纯资源的更新不会动到 binary, 只算它的话那类更新永远推不出去。
          # 排序后逐档 md5 再总合, 档名也纳入(可侦测改名/增删)。
          ( cd emulationstation && find . -type f -not -name build-info.txt | LC_ALL=C sort | xargs md5sum | md5sum | awk '{print $1}' )  > emulationstation-armbian-aarch64.zip.md5
          cat emulationstation-armbian-aarch64.zip.md5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emulationstation-armbian-aarch64
          path: dist/emulationstation/

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP '#define PROGRAM_VERSION_STRING\s+"\K[^"]+' es-app/src/EmulationStation.h)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        # es4all: 发布类型由 PROGRAM_VERSION_STRING 是否含 "pre" 决定, 与分支无关。
        #   含 pre(如 1.1pre) → 预览版(prerelease, 不设为 latest); 否则(如 1.0/1.1) → 正式版 latest。
        #   版本序: 1.0 < 1.1pre < 1.1 < 1.2pre < 1.2 ...  main=1.0 发正式版, v1.1-dev=1.1pre 发预览版,
        #   两者 tag 不同(v1.0 / v1.1pre)不冲突。ES 自我更新读 releases(含 prerelease)即可 OTA。
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: es4all v${{ steps.version.outputs.version }}
          prerelease: ${{ contains(steps.version.outputs.version, 'pre') }}
          make_latest: ${{ !contains(steps.version.outputs.version, 'pre') }}
          files: |
            dist/emulationstation-armbian-aarch64.zip
            dist/emulationstation-armbian-aarch64.zip.md5
          body: |
            es4all 三平台(armbian / rocknix / emuelec)aarch64 构建。
            每个 zip 内含 emulationstation(主程序) + resources + locale，解压后覆盖到设备对应目录即可，无需重新编译，重启 EmulationStation 生效。
            版本号含 "pre" 为预览版(开发中)。
            <!-- es4all: 构建指纹已改用各 <zip>.md5 资产(整包 md5)，不再往 body 写 commit sha。
                 原本这里有 `es4all-build-sha: <sha>`，是旧机制残留 —— 它是 40 位 commit sha，
                 跟新的 32 位整包 md5 永远不等；一旦 .md5 下载失败就会 fallback 到它、误报有更新。已移除。 -->

  build-rocknix:
    runs-on: ubuntu-24.04-arm
    needs: build
    container:
      image: arm64v8/debian:trixie
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config gettext ca-certificates zip \
            libsdl2-dev libsdl2-mixer-dev \
            libfreeimage-dev libfreetype-dev \
            libcurl4-openssl-dev libpugixml-dev rapidjson-dev \
            libasound2-dev libvlc-dev libvlccore-dev \
            libpulse-dev libespeak-dev

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (CMake, rocknix target)
        run: |
          mkdir -p build
          cd build
          # es4all: 与 dist/rocknix/package.mk 对齐，但 ★不传 -DUSE_SYSTEM_PUGIXML=1★。
          # 原因：package.mk 那个旗标是给 ROCKNIX 建置系统用的(它的 pugixml 是静态的，链进去没事)；
          # 本 CI 跑在 Debian 容器里，开了这个旗标会去链容器的 libpugixml.so.1 变成【动态依赖】，
          # 而 ROCKNIX 实机根本没有这个 so(固件烤入的 ES 是静态链 pugixml) →
          # OTA zip 部署到实机会 `error while loading shared libraries: libpugixml.so.1` 起不来。
          # 保持默认 OFF 用内建 external/pugixml 静态编入，zip 才自足(armbian/emuelec 两个 job 也是这样)。
          cmake .. -DGLES=OFF -DGLES2=ON -DES4ALL_TARGET=rocknix \
                   -DROCKNIX=1 -DDISABLE_KODI=1 -DENABLE_FILEMANAGER=0 -DCEC=0 \
                   -DENABLE_PULSE=1

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Package artifacts
        run: |
          mkdir -p dist/emulationstation
          cp emulationstation dist/emulationstation/emulationstation
          cp -r resources dist/emulationstation/
          date -u +%Y%m%d%H%M%S > dist/emulationstation/resources/build-info.txt
          cp -r locale dist/emulationstation/
          cd dist/emulationstation
          zip -r ../emulationstation-rocknix-aarch64.zip .
          cd ..
          # es4all: 构建指纹 = **整包内容**的确定性 md5(binary + resources + locale)。
          # 不用 zip 本身的 md5: zip 内含档案时间戳, 每次打包都不同、不可重现。
          # 不只算 binary: 纯翻译/纯资源的更新不会动到 binary, 只算它的话那类更新永远推不出去。
          # 排序后逐档 md5 再总合, 档名也纳入(可侦测改名/增删)。
          ( cd emulationstation && find . -type f -not -name build-info.txt | LC_ALL=C sort | xargs md5sum | md5sum | awk '{print $1}' )  > emulationstation-rocknix-aarch64.zip.md5
          cat emulationstation-rocknix-aarch64.zip.md5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emulationstation-rocknix-aarch64
          path: dist/emulationstation/

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP '#define PROGRAM_VERSION_STRING\s+"\K[^"]+' es-app/src/EmulationStation.h)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish Release (rocknix asset)
        # es4all: 追加 rocknix 产物到同一 release; 发布类型同随版本号(含 pre = 预览版)。
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          prerelease: ${{ contains(steps.version.outputs.version, 'pre') }}
          make_latest: ${{ !contains(steps.version.outputs.version, 'pre') }}
          files: |
            dist/emulationstation-rocknix-aarch64.zip
            dist/emulationstation-rocknix-aarch64.zip.md5

  build-emuelec:
    runs-on: ubuntu-24.04-arm
    needs: build
    container:
      # es4all: EmuELEC 4.8 的 userland 是 glibc 2.36 / libstdc++ GLIBCXX_3.4.30 / CXXABI_1.3.13。
      # 用 trixie(glibc 2.38, GLIBCXX_3.4.32) 编出来的 binary 到 EmuELEC 上会因
      # "GLIBC_2.38 not found / GLIBCXX_3.4.32 not found" 起不来。改用 bookworm(glibc 2.36,
      # GLIBCXX_3.4.30, CXXABI_1.3.13)——与 EmuELEC 4.8 完全对齐, 编出的 binary 可直接运行。
      # (armbian/rocknix 目标的 userland glibc 更新[2.38/2.41], trixie 编的照常兼容, 无需改。)
      image: arm64v8/debian:bookworm
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config gettext ca-certificates zip \
            libsdl2-dev libsdl2-mixer-dev \
            libfreeimage-dev libfreetype-dev \
            libcurl4-openssl-dev libpugixml-dev rapidjson-dev \
            libasound2-dev libvlc-dev libvlccore-dev \
            libpulse-dev libespeak-dev

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (CMake, emuelec target)
        run: |
          mkdir -p build
          cd build
          # es4all: 与 dist/emuelec/package.mk 对齐(该档未带 CEC，故 CEC 保持 CMake 预设 ON)
          cmake .. -DGLES=OFF -DGLES2=ON -DES4ALL_TARGET=emuelec -DENABLE_EMUELEC=1 \
                   -DDISABLE_KODI=1 -DENABLE_FILEMANAGER=1 -DENABLE_TTS=1

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Package artifacts
        run: |
          mkdir -p dist/emulationstation
          cp emulationstation dist/emulationstation/emulationstation
          cp -r resources dist/emulationstation/
          date -u +%Y%m%d%H%M%S > dist/emulationstation/resources/build-info.txt
          cp -r locale dist/emulationstation/
          cd dist/emulationstation
          zip -r ../emulationstation-emuelec-aarch64.zip .
          cd ..
          # es4all: 构建指纹 = **整包内容**的确定性 md5(binary + resources + locale)。
          # 不用 zip 本身的 md5: zip 内含档案时间戳, 每次打包都不同、不可重现。
          # 不只算 binary: 纯翻译/纯资源的更新不会动到 binary, 只算它的话那类更新永远推不出去。
          # 排序后逐档 md5 再总合, 档名也纳入(可侦测改名/增删)。
          ( cd emulationstation && find . -type f -not -name build-info.txt | LC_ALL=C sort | xargs md5sum | md5sum | awk '{print $1}' )  > emulationstation-emuelec-aarch64.zip.md5
          cat emulationstation-emuelec-aarch64.zip.md5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emulationstation-emuelec-aarch64
          path: dist/emulationstation/

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP '#define PROGRAM_VERSION_STRING\s+"\K[^"]+' es-app/src/EmulationStation.h)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish Release (emuelec asset)
        # es4all: 追加 emuelec 产物到同一 release; 发布类型同随版本号(含 pre = 预览版)。
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          prerelease: ${{ contains(steps.version.outputs.version, 'pre') }}
          make_latest: ${{ !contains(steps.version.outputs.version, 'pre') }}
          files: |
            dist/emulationstation-emuelec-aarch64.zip
            dist/emulationstation-emuelec-aarch64.zip.md5
