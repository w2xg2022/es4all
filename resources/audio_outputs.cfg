# es4all AUDIO OUTPUT device-to-audio-output mapping table
# ---------------------------------------------------------------------------
# The AUDIO OUTPUT menu in platform settings (EMUELEC) uses this table to decide
# which audio outputs are shown for a given device model.
# Backend reuses emuelec-utils setauddev: selecting an entry changes asound.conf's
# default PCM to hw:<card,device>.
#
# Format (one model per line, lines starting with # are comments):
#   <model substring>   <label:card,device>  <label:card,device> ...
#   - model substring: matched against /proc/device-tree/model (substring match;
#     the first matching line wins).
#   - label: HDMI/AV are kept as-is; OPTICAL etc. are translated (see .po files).
#     Labels can be customized.
#   - card,device: ALSA hw:card,device. ⚠️ Numbering differs per model, and having
#     an ALSA PCM does NOT mean there's a physical jack — always confirm on real
#     hardware with `aplay -l` + listening to each output via setauddev before
#     filling this in (don't copy from another model).
#
# Adding a new model = add one line; no code changes or ES rebuild needed. This
# file ships in resources and is delivered via self-update OTA.
# Models not listed here: the AUDIO OUTPUT menu is hidden (keeps the system's
# factory-default audio output, the safest choice).
# ---------------------------------------------------------------------------

# Skyworth E900V22C (S905L3A/G12A) — verified on real hardware 2026-07-19
# (aplay -l + listened to each output individually):
#   HDMI=hw:0,2 (SPDIF-dummy->HDMITX), AV=hw:0,1 (TDM-B-T9015 analog DAC); no optical jack.
E900V22C   HDMI:0,2 AV:0,1

# MD1000 (RK3566, ROCKNIX) — verified on real hardware 2026-07-23
# (aplay -l + listened: 440Hz sine came out of the 3.5mm AV jack, both channels).
#   HDMI = hw:0,0  (fe400000.i2s -> HDMI)
#   AV   = hw:1,0  (fe410000.i2s -> RK809 "Analog RK809")
# ★Unlike E900V22C, these are two SEPARATE CARDS★ (different I2S controllers), not two devices
# on one card. Consequence: switching is a *real* switch — selecting AV leaves HDMI silent, so
# this model needs NO extra mute step. (E900V22C shares one AUGE controller that feeds HDMITX and
# the T9015 at the same time, which is why it additionally needs the 'Audio hdmi-out mute' control.)
# Verified by ear: default sink on card 1 -> only AV audible, HDMI silent.
#
# Model string is "MD1000 RK3566", so the "MD1000" key matches as a substring.
# ROCKNIX routes through PipeWire (not raw ALSA): es4all-setauddev maps the card number to the
# matching sink — verified card0 -> sink 69, card1 -> sink 55, switching works both ways.
# ⚠️ Requires the AV codec present in the running device tree (RK809 + i2s1 TX-only pinctrl).
#    If aplay -l shows only HDMI/SPDIF, the booted dtb lacks that fix — see the ROCKNIX handoff.
MD1000     HDMI:0,0 AV:1,0
