# es4all AUDIO OUTPUT 机型音源映射表
# ---------------------------------------------------------------------------
# 平台设置(EMUELEC)的 AUDIO OUTPUT 选单按本表决定某机型显示哪些音源输出。
# 后端复用 emuelec-utils setauddev: 选了就把 asound.conf 默认 PCM 改成 hw:<card,device>。
#
# 格式(每行一机型, # 开头为注释):
#   <型号子串>   <标签:card,device>  <标签:card,device> ...
#   - 型号子串: 匹配 /proc/device-tree/model(子串包含即算命中, 用第一个命中行)。
#   - 标签: HDMI/AV 保留原文; OPTICAL 等有翻译(见 .po)。可自定义。
#   - card,device: ALSA hw:card,device。⚠️各机型编号不同, 且 ALSA 有 PCM ≠ 有实体孔,
#     必须实机 `aplay -l` + 逐一 setauddev 实听确认后再填(别照抄)。
#
# 加新机型 = 加一行, 不用改代码/重编 ES; 本文件在 resources 里随自我更新 OTA 下发。
# 不在表内的机型: 不显示 AUDIO OUTPUT 选单(保持系统出厂默认音源, 最安全)。
# ---------------------------------------------------------------------------

# Skyworth E900V22C (S905L3A/G12A) —— 实测 2026-07-19 (aplay -l + 逐一实听):
#   HDMI=hw:0,2 (SPDIF-dummy->HDMITX), AV=hw:0,1 (TDM-B-T9015 模拟 DAC); 无光纤实体孔。
E900V22C   HDMI:0,2 AV:0,1
